<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sementis</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <!-- Header -->
    <header class="home-header">
        <div class="header-top">
            <img src="assets/brand/logo_sementis_branco.png" alt="Sementis Logo" class="header-logo">
            <div class="user-stats">
                <div class="stat-item">
                    <img src="assets/icons/icone_sequencia_fogo.png" alt="Sequência" class="stat-icon">
                    <span class="stat-value">7</span>
                </div>
                <div class="stat-item">
                    <img src="assets/icons/icone_moeda.png" alt="Moedas" class="stat-icon">
                    <span class="stat-value">250</span>
                </div>
                <div class="stat-item">
                    <img src="assets/icons/icone_vida.png" alt="Vidas" class="stat-icon">
                    <span class="stat-value">5</span>
                </div>
                <button class="profile-btn">
                    <img src="assets/icons/icone_usuario.png" alt="Perfil">
                </button>
            </div>
        </div>

        <div class="user-progress">
            <div class="user-info">
                <div class="user-avatar">
                    <img src="assets/icons/icone_usuario.png" alt="Avatar">
                </div>
                <div class="user-details">
                    <h2 class="user-name">Estudante</h2>
                    <p class="user-level">Nível 5 - Bronze</p>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 60%"></div>
            </div>
            <span class="progress-text">60% para o próximo nível</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="home-content">
        <!-- Home/Default View -->
        <div class="content-wrapper">
            <section class="daily-goal">
                <div class="goal-card">
                    <img src="assets/icons/menu_rodape_alvo.png" alt="Meta Diária" class="goal-icon">
                    <div class="goal-info">
                        <h3>Meta Diária</h3>
                        <p>Complete 3 lições hoje</p>
                        <div class="goal-progress">
                            <div class="goal-progress-bar">
                                <div class="goal-progress-fill" style="width: 33%"></div>
                            </div>
                            <span class="goal-count">1/3</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Games Section -->
            <section class="quick-games">
                <h2 class="section-title">Mini-Jogos Rápidos</h2>
                <div class="games-grid">
                    <div class="game-quick-card">
                        <img src="assets/jogos/flappy-fish/jogo_flappy_fish_peixe.png" alt="Flappy Fish" class="game-thumb">
                        <div class="game-overlay">
                            <h3>Flappy Fish</h3>
                            <p>Desvie da poluição</p>
                        </div>
                    </div>
                    <div class="game-quick-card">
                        <img src="assets/jogos/garbage-recycle/jogo_garbage_recycle_cesto_lixo_reciclavel.png" alt="Garbage Recycle" class="game-thumb">
                        <div class="game-overlay">
                            <h3>Garbage Recycle</h3>
                            <p>Separe o lixo</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Achievements Preview -->
            <section class="achievements-preview">
                <h2 class="section-title">Conquistas Recentes</h2>
                <div class="achievements-grid">
                    <div class="achievement-card">
                        <img src="assets/ligas/liga_medalha_bronze.png" alt="Medalha Bronze">
                        <p>Primeira Lição</p>
                    </div>
                    <div class="achievement-card">
                        <img src="assets/ligas/missao_alvo_bronze.png" alt="Missão Bronze">
                        <p>3 Dias Seguidos</p>
                    </div>
                    <div class="achievement-card locked-achievement">
                        <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Bloqueado">
                        <p>Bloqueado</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="sidebar-logo">
            <img src="assets/brand/logo_sementis_branco.png" alt="Sementis">
        </div>
        <div class="nav-items-wrapper">
            <button class="nav-item">
                <img src="assets/icons/menu_rodape_tarefa.png" alt="Tarefas">
                <span>Tarefas</span>
            </button>
            <button class="nav-item">
                <img src="assets/icons/menu_rodape_trofeu_liga.png" alt="Ligas">
                <span>Ligas</span>
            </button>
            <button class="nav-item">
                <img src="assets/icons/menu_rodape_alvo.png" alt="Missões">
                <span>Missões</span>
            </button>
            <button class="nav-item">
                <img src="assets/icons/menu_rodape_usuario.png" alt="Perfil">
                <span>Perfil</span>
            </button>
        </div>
    </nav>

    <script src="js/main.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
