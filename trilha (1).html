<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a4a">
<meta name="application-name" content="Sementis">
<link rel="manifest" href="pwa/manifest.webmanifest">
<link rel="icon" href="assets/icons/pwa-icon.svg" type="image/svg+xml">
<title>Trilha de Aprendizado - Sementis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  :root {
    --bg:           #27275e;
    --bg-dark:      #1a1a4a;
    --bg-light:     #3a3a7a;
    --green:        #a9ff71;
    --green-dark:   #7acc44;
    --green-glow:   rgba(169, 255, 113, 0.4);
    --node-locked:  #2d2d5a;
    --node-border:  #3a3a6a;
    --path-done:    #a9ff71;
    --path-locked:  #3d3d72;
    --text-muted:   #7878b0;
    --text-light:   #a0a0c8;
    --shadow-base:  rgba(0, 0, 0, 0.2);
    --shadow-strong: rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    background-image:
      linear-gradient(135deg, var(--bg) 0%, var(--bg-dark) 100%);
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 92px;
    overflow-x: hidden;
    position: relative;
  }

  /* Background decorative elements */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 20%, rgba(169, 255, 113, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(169, 255, 113, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    right: -220px;
    bottom: -160px;
    width: clamp(640px, 95vw, 1200px);
    aspect-ratio: 1 / 1;
    background: url('assets/brand/logo_sementis_background_5__opacidade.png') no-repeat center / contain;
    opacity: 0.22;
    transform: rotate(-24deg);
    pointer-events: none;
    z-index: 0;
  }

  /* ── BOTTOM NAV / SIDEBAR ───────────────── */
  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 20;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
    background: var(--bg-dark);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.25);
  }

  .sidebar-logo {
    display: none;
  }

  .nav-items-wrapper {
    display: contents;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    border-radius: 12px;
    color: #8d92bc;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .nav-item img {
    width: 30px;
    height: 30px;
    transition: transform 0.2s ease;
  }

  .nav-item span {
    font-size: 11px;
    font-weight: 600;
  }

  .nav-item.active {
    color: var(--green);
  }

  .nav-item.active img {
    transform: scale(1.08);
  }

  .nav-item:hover:not(.active) {
    color: #fff;
  }

  .back-btn {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    left: 14px;
    z-index: 25;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 13px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(26, 26, 74, 0.82);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    backdrop-filter: blur(4px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .back-btn:hover {
    transform: translateY(-1px);
    background: rgba(42, 42, 98, 0.9);
  }

  /* ── HEADER ─────────────────────────────── */
  .header {
    width: 100%;
    max-width: 460px;
    padding: 40px 32px 24px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px var(--shadow-base);
  }
  .header p {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }
  .xp-bar-wrap {
    margin: 0 auto;
    width: 240px;
    height: 12px;
    background: var(--bg-dark);
    border-radius: 99px;
    overflow: hidden;
    border: 2px solid rgba(169, 255, 113, 0.15);
    box-shadow: inset 0 2px 4px var(--shadow-base),
                0 2px 8px var(--shadow-base);
    position: relative;
  }
  .xp-bar-wrap::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    pointer-events: none;
  }
  .xp-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--green-dark) 0%, var(--green) 100%);
    border-radius: 99px;
    transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--green-glow);
    position: relative;
  }
  .xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
    border-radius: 99px;
  }

  /* ── TRAIL SCENE ─────────────────────────── */
  .trail-scene {
    position: relative;
    width: 100%;
    max-width: 460px;
    z-index: 1;
  }

  .trail-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px var(--shadow-base));
  }

  /* ── NODE ────────────────────────────────── */
  .node {
    position: absolute;
    width: 110px;
    height: 110px;
    transform: translate(-50%, -50%);
    cursor: default;
    filter: drop-shadow(0 4px 12px var(--shadow-base));
    transition: filter 0.3s ease;
  }

  .node-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .node.done:hover .node-inner,
  .node.active:hover .node-inner {
    transform: scale(1.1);
  }

  .node.locked .node-inner {
    background: linear-gradient(145deg, var(--node-locked) 0%, #22224a 100%);
    box-shadow: 0 8px 0 #1a1a3e,
                inset 0 2px 0 rgba(255, 255, 255, 0.05),
                inset 0 -2px 4px rgba(0, 0, 0, 0.3);
    border: 4px solid var(--node-border);
  }

  .node.done .node-inner,
  .node.active .node-inner {
    background: linear-gradient(145deg, var(--green) 0%, var(--green-dark) 100%);
    box-shadow: 0 8px 0 #6aaa34,
                0 0 30px var(--green-glow),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
    border: 4px solid #d4ff9e;
  }

  .node.active .node-inner {
    cursor: pointer;
  }

  .node.done:hover .node-inner,
  .node.active:hover .node-inner {
    box-shadow: 0 8px 0 #6aaa34,
                0 0 38px var(--green-glow),
                0 0 56px rgba(169, 255, 113, 0.28),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 4px rgba(0, 0, 0, 0.2);
  }

  @keyframes nodePulse {
    0%, 100% {
      box-shadow: 0 8px 0 #6aaa34,
                  0 0 20px var(--green-glow),
                  inset 0 2px 0 rgba(255, 255, 255, 0.4);
    }
    50% {
      box-shadow: 0 8px 0 #6aaa34,
                  0 0 45px var(--green-glow),
                  0 0 60px rgba(169, 255, 113, 0.3),
                  inset 0 2px 0 rgba(255, 255, 255, 0.4);
    }
  }

  .node img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 50%;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
  }

  .node-label {
    position: absolute;
    bottom: -28px; left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-muted);
    transition: color 0.3s ease;
    text-shadow: 0 1px 2px var(--shadow-base);
  }
  .node.done .node-label,
  .node.active .node-label {
    color: var(--green);
    font-weight: 800;
  }

  /* star badge */
  .star-badge {
    position: absolute;
    top: -6px; right: -6px;
    width: 32px; height: 32px;
    background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 3px 8px var(--shadow-strong),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
    border: 3px solid var(--green-dark);
    animation: starAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes starAppear {
    0% { transform: scale(0) rotate(-180deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* bounce arrow */
  .arrow-bounce {
    position: absolute;
    top: -36px; left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    color: var(--green);
    animation: bounce 0.8s ease-in-out infinite alternate;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px var(--shadow-base));
  }
  @keyframes bounce {
    from { transform: translateX(-50%) translateY(0); opacity: 1; }
    to   { transform: translateX(-50%) translateY(-10px); opacity: 0.7; }
  }

  /* ── SVG PATHS ───────────────────────────── */
  .seg-done {
    stroke: var(--path-done);
    stroke-width: 8;
    fill: none;
    stroke-dasharray: 18 10;
    stroke-linecap: round;
    filter: drop-shadow(0 0 8px var(--green-glow));
    animation: pathDraw 0.8s ease-out;
  }
  .seg-locked {
    stroke: var(--path-locked);
    stroke-width: 8;
    fill: none;
    stroke-dasharray: 18 10;
    stroke-linecap: round;
    opacity: 0.6;
  }

  @keyframes pathDraw {
    from { stroke-dashoffset: 100; }
    to { stroke-dashoffset: 0; }
  }

  /* ── RESPONSIVE ─────────────────────────── */
  @media (max-width: 480px) {
    body {
      padding-bottom: 88px;
    }

    body::after {
      right: -170px;
      bottom: 48px;
      width: clamp(420px, 108vw, 760px);
      opacity: 0.18;
    }
    .header {
      padding: 32px 24px 20px;
    }
    .header h1 {
      font-size: 24px;
    }
    .xp-bar-wrap {
      width: 200px;
    }
    .node {
      width: 100px;
      height: 100px;
    }
    .node-label {
      font-size: 11px;
      bottom: -26px;
    }

    .back-btn {
      top: calc(10px + env(safe-area-inset-top));
      left: 10px;
      padding: 8px 11px;
      font-size: 12px;
    }
  }

  @media (min-width: 768px) {
    .header h1 {
      font-size: 32px;
    }
    .xp-bar-wrap {
      width: 280px;
      height: 14px;
    }
    .node {
      width: 120px;
      height: 120px;
    }
    .node-label {
      font-size: 13px;
      bottom: -30px;
    }
  }

  @media (min-width: 1024px) {
    body {
      padding-bottom: 0;
      padding-left: 250px;
    }

    .bottom-nav {
      top: 0;
      right: auto;
      bottom: 0;
      width: 250px;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      padding: 0;
      border-top: none;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.25);
    }

    .sidebar-logo {
      display: block;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
    }

    .sidebar-logo img {
      width: 100%;
      height: auto;
      display: block;
    }

    .nav-items-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 12px;
    }

    .nav-item {
      flex-direction: row;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 16px;
    }

    .nav-item span {
      font-size: 18px;
      font-weight: 700;
    }

    .nav-item.active {
      background: rgba(169, 255, 113, 0.1);
    }

    .nav-item:hover:not(.active) {
      background: rgba(255, 255, 255, 0.06);
    }

    .back-btn {
      left: 268px;
      top: 18px;
    }
  }
</style>
</head>
<body>

<a class="back-btn" href="home.html" aria-label="Voltar para home">← Voltar</a>

<div class="header">
  <h1 id="trilhaTitle">Trilha de Aprendizado</h1>
  <p>1 de 7 concluídas</p>
  <div class="xp-bar-wrap">
    <div class="xp-bar-fill" id="xpFill"></div>
  </div>
</div>

<div class="trail-scene" id="scene"></div>

<nav class="bottom-nav" aria-label="Navegacao principal">
  <div class="sidebar-logo">
    <img src="assets/brand/logo_sementis_branco.png" alt="Sementis">
  </div>
  <div class="nav-items-wrapper">
    <a class="nav-item active" href="home.html" aria-current="page">
      <img src="assets/icons/menu_rodape_tarefa.png" alt="Trilhas">
      <span>Trilhas</span>
    </a>
    <a class="nav-item" href="home.html">
      <img src="assets/icons/menu_rodape_trofeu_liga.png" alt="Ligas">
      <span>Ligas</span>
    </a>
    <a class="nav-item" href="home.html">
      <img src="assets/icons/menu_rodape_alvo.png" alt="Missões">
      <span>Missões</span>
    </a>
    <a class="nav-item" href="home.html">
      <img src="assets/icons/menu_rodape_usuario.png" alt="Perfil">
      <span>Perfil</span>
    </a>
  </div>
</nav>

<script>
function applyModuleTitle() {
  const titleEl = document.getElementById('trilhaTitle');
  if (!titleEl) return;

  const params = new URLSearchParams(window.location.search);
  const moduleTitle = params.get('module');

  if (moduleTitle && moduleTitle.trim()) {
    titleEl.textContent = moduleTitle.trim();
    document.title = `${moduleTitle.trim()} - Sementis`;
  }
}

applyModuleTitle();

const lessons = [
  { label: 'Introdução', state: 'done'   },
  { label: 'Lição 1',    state: 'active' },
  { label: 'Lição 2',    state: 'locked' },
  { label: 'Lição 3',    state: 'locked' },
  { label: 'Lição 4',    state: 'locked' },
  { label: 'Lição 5',    state: 'locked' },
  { label: 'Conclusão',  state: 'locked' },
];

// Horizontal anchors (fraction 0..1) — nice organic S-curve
const X_ANCHORS = [0.25, 0.75, 0.72, 0.28, 0.25, 0.75, 0.28];
const V_STEP    = 160;
const PAD_TOP   = 80;
const PAD_BOT   = 100;

function build() {
  const scene = document.getElementById('scene');
  const W = Math.min(window.innerWidth, 460);
  const H = PAD_TOP + V_STEP * (lessons.length - 1) + PAD_BOT;
  scene.style.height = H + 'px';

  // Centers
  const pts = lessons.map((_, i) => ({
    x: X_ANCHORS[i] * W,
    y: PAD_TOP + i * V_STEP,
  }));

  // ── SVG ────────────────────────────────────
  const svgNS = 'http://www.w3.org/2000/svg';
  let svg = scene.querySelector('.trail-svg');
  if (!svg) {
    svg = document.createElementNS(svgNS, 'svg');
    svg.classList.add('trail-svg');
    scene.appendChild(svg);
  }
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i+1];
    const isDone = lessons[i].state === 'done';

    // Catmull-style: pull control points toward the far side to get juicy S-curves
    const flip = (i % 2 === 0) ? 1 : -1;
    const bulge = W * 0.24 * flip;
    const midY = (a.y + b.y) / 2;
    const cp1x = a.x + bulge, cp1y = midY - V_STEP * 0.12;
    const cp2x = b.x + bulge, cp2y = midY + V_STEP * 0.12;

    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', `M${a.x},${a.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${b.x},${b.y}`);
    p.setAttribute('class', isDone ? 'seg-done' : 'seg-locked');
    svg.appendChild(p);
  }

  // ── Nodes ──────────────────────────────────
  scene.querySelectorAll('.node').forEach(n => n.remove());

  lessons.forEach((lesson, i) => {
    const {x, y} = pts[i];
    const div = document.createElement('div');
    div.className = `node ${lesson.state}`;
    div.style.left = x + 'px';
    div.style.top  = y + 'px';

    const inner = document.createElement('div');
    inner.className = 'node-inner';

    const img = document.createElement('img');
    img.src = (lesson.state === 'locked')
      ? 'assets/tarefas/tarefa_bloqueada.png'
      : 'assets/tarefas/tarefa_concluida.png';
    img.alt = lesson.state;
    inner.appendChild(img);

    if (lesson.state === 'done' && lesson.label !== 'Introdução') {
      const star = document.createElement('div');
      star.className = 'star-badge';
      star.textContent = '⭐';
      inner.appendChild(star);
    }

    if (lesson.state === 'active') {
      const arrow = document.createElement('div');
      arrow.className = 'arrow-bounce';
      arrow.textContent = '▼';
      inner.appendChild(arrow);
    }

    div.appendChild(inner);

    const lbl = document.createElement('span');
    lbl.className = 'node-label';
    lbl.textContent = lesson.label;
    div.appendChild(lbl);

    scene.appendChild(div);
  });

  // XP bar animation
  const done = lessons.filter(l => l.state === 'done').length;
  const percentage = (done / lessons.length * 100).toFixed(0);

  setTimeout(() => {
    const fillElement = document.getElementById('xpFill');
    fillElement.style.width = percentage + '%';
  }, 500);
}

build();
window.addEventListener('resize', build);
</script>
<script src="pwa/pwa-register.js"></script>
</body>
</html>
